name: CI — CanTelcoX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint svc-customer
        run: flake8 svc-customer/ --max-line-length=100 --exclude=__pycache__ --ignore=E302,E305,F401

      - name: Lint svc-order
        run: flake8 svc-order/ --max-line-length=100 --exclude=__pycache__ --ignore=E302,E305,F401

  test-customer:
    name: Tests unitaires svc-customer
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd svc-customer
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd svc-customer
          pytest tests/unit/ -v --cov=domain --cov=application --cov-report=term-missing

  test-order:
    name: Tests unitaires svc-order
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd svc-order
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd svc-order
          pytest tests/unit/ -v --cov=domain --cov=application --cov-report=term-missing

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-customer, test-order]
    steps:
      - uses: actions/checkout@v4

      - name: Build svc-customer
        run: docker build -t cantelcox-svc-customer ./svc-customer

      - name: Build svc-order
        run: docker build -t cantelcox-svc-order ./svc-order
