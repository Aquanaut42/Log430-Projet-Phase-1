events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_x_trace_id"';

    access_log /var/log/nginx/access.log main;

    upstream svc_customer {
        server svc-customer:8001;
    }

    upstream svc_order {
        server svc-order:8002;
    }

    server {
        listen 8080;

        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Idempotency-Key $http_idempotency_key;
        proxy_set_header Authorization $http_authorization;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Idempotency-Key";

        location /v1/customers {
            proxy_pass http://svc_customer;
        }

        location /v1/auth {
            proxy_pass http://svc_customer;
        }

        location /v1/orders {
            proxy_pass http://svc_order;
        }

        location /v1/lines {
            proxy_pass http://svc_order;
        }

        location /v1/usage {
            proxy_pass http://svc_order;
        }

        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }
    }
}
